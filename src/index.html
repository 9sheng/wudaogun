<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五导棍</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>五导棍</h1>
      <div class="subtitle"></div>
    </div>

    <div class="score-panel">
      <div class="score-side">
        <span class="piece-icon black"></span>
        <span>黑</span>
        <span class="count" id="count-b">0</span>
      </div>
      <div class="score-divider">
        <span class="move-info" id="move-count">0/25</span>
      </div>
      <div class="score-side">
        <span class="count" id="count-w">0</span>
        <span>白</span>
        <span class="piece-icon white"></span>
      </div>
    </div>

    <div id="status">
      <span class="phase-tag">下子阶段</span>
      <span class="turn-indicator turn-black">● 黑方</span>
      <span class="status-msg">请落子</span>
    </div>

    <canvas id="board"></canvas>
    <div id="winner-overlay" onclick="this.classList.remove('show')"></div>
    <div id="phase-overlay"></div>

    <button id="btn-claim" onclick="Board.pauseTimer()">
      <div id="timer-fill"></div>
      <span class="claim-text">🎯 请掐子！</span>
    </button>

    <div class="controls">
      <button onclick="Board.undoMove()">↩ 悔棋</button>
      <button onclick="Board.surrender()">🏳 认输</button>
      <button onclick="Board.newGame()">🔄 新局</button>
      <select id="ai-select" onchange="Board.setAI(this.value)">
        <option value="">👥 双人对战</option>
        <option value="random">🤖 AI: 随机</option>
        <option value="greedy" selected>🤖 AI: 贪心</option>
        <option value="minimax">🤖 AI: 极小极大</option>
        <option value="mcts">🤖 AI: 蒙特卡洛</option>
        <option value="negamax">🤖 AI: 深度搜索</option>
      </select>
      <select id="first-select" onchange="Board.setFirst(this.value)">
        <option value="B">⚫ 黑先</option>
        <option value="W">⚪ 白先</option>
      </select>
    </div>

    <div class="toggle-row">
      <input type="checkbox" id="hints-toggle" checked onchange="Board.setHints(this.checked)">
      <label for="hints-toggle">显示成形提示</label>
      <input type="checkbox" id="multi-pinch-toggle" onchange="Board.setMultiPinch(this.checked)">
      <label for="multi-pinch-toggle">掐多子</label>
      <input type="checkbox" id="sound-toggle" checked onchange="Board.setSound(this.checked)">
      <label for="sound-toggle">🔊 音效</label>
    </div>

    <div class="rules">
      <b>规则简述：</b>交替落子填满25格，成形（3/4/5斜·大棍·方）后5秒内点"掐子"可标记对方一子死亡。
      满格后移除死子进入走子阶段，轮流移动至相邻空位，成形立即提子。无路可走须献祭一子。全灭即胜。
    </div>
  </div>

  <script src="js/formation.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ai/eval.js"></script>
  <script src="js/ai/random.js"></script>
  <script src="js/ai/greedy.js"></script>
  <script src="js/ai/minimax.js"></script>
  <script src="js/ai/mcts.js"></script>
  <script src="js/ai/negamax.js"></script>
  <script src="js/ai/ai.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/board.js"></script>
  <script>Board.init(document.getElementById('board'));</script>
</body>
</html>
