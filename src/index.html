<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五阶精策棋</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>五阶精策棋 <span>5×5 Strategy Game</span></h1>
    <div id="piece-count">⚫ 0 | ⚪ 0</div>
    <div id="status">下子阶段 | ⚫ 黑方 | 请落子</div>
    <div class="timer-wrap"><div id="timer-bar"></div></div>
    <canvas id="board"></canvas>
    <div class="controls">
      <button id="btn-claim" onclick="Board.claimPinch()">我要掐子!</button>
      <button onclick="Board.undoMove()">悔棋</button>
      <button onclick="Board.newGame()">新局</button>
      <select id="ai-select" onchange="Board.setAI(this.value)">
        <option value="">双人对战</option>
        <option value="random">AI: 随机</option>
        <option value="greedy">AI: 贪心</option>
        <option value="minimax">AI: 极小极大</option>
        <option value="mcts">AI: 蒙特卡洛</option>
      </select>
      <label><input type="checkbox" checked onchange="Board.setHints(this.checked)"> 成形提示</label>
    </div>
    <div class="info">
      <b>规则：</b>下子阶段交替落子填满25格。成形（3/4/5斜、大棍、方）后5秒内点"我要掐子"可标记对方一子死亡。
      走子阶段移除死子，轮流移动至相邻空位，成形立即提子。无路可走须献祭一子。对方全灭即胜。
    </div>
  </div>

  <script src="js/formation.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ai/random.js"></script>
  <script src="js/ai/greedy.js"></script>
  <script src="js/ai/minimax.js"></script>
  <script src="js/ai/mcts.js"></script>
  <script src="js/ai/ai.js"></script>
  <script src="js/board.js"></script>
  <script>Board.init(document.getElementById('board'));</script>
</body>
</html>
